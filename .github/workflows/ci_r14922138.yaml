name: CI r14922138

on:
  push:
    branches:
      - '**'

permissions:
  contents: read
  checks: write
  actions: read

concurrency:
  group: ci-r14922138-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck, format, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck

      - name: Prettier check
        id: prettier
        continue-on-error: true
        run: npm run format:check

      - name: Test with JUnit report
        id: tests
        continue-on-error: true
        run: npm test -- --reporter=default --reporter=junit --outputFile=junit.xml

      - name: Publish test results
        if: ${{ always() && hashFiles('junit.xml') != '' }}
        uses: dorny/test-reporter@v1
        with:
          name: Vitest Results
          path: junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test report artifact
        if: ${{ always() && hashFiles('junit.xml') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: vitest-junit-report
          path: junit.xml

      - name: Fail when any check failed
        if: ${{ always() && (steps.typecheck.outcome == 'failure' || steps.prettier.outcome == 'failure' || steps.tests.outcome == 'failure') }}
        run: |
          echo "One or more CI checks failed."
          echo "typecheck: ${{ steps.typecheck.outcome }}"
          echo "prettier: ${{ steps.prettier.outcome }}"
          echo "tests: ${{ steps.tests.outcome }}"
          exit 1
